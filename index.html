<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Для тебя ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root{
  --ink:#2f2721;
  --paper:rgba(255,255,255,.93);
}

html, body {
  margin: 0;
  min-height: 100%;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
  color: var(--ink);
  background: #f7f0e8;
}

body{
  background: url("bg.jpg") center center / cover fixed no-repeat;
}

body::before{
  content:"";
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,.08), rgba(255,255,255,.22));
  pointer-events: none;
  z-index: 0;
}

#app{
  position: relative;
  z-index: 2;
}

.page{
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 12px 28px;
}

.page.scroll{
  justify-content: flex-start;
  padding-top: 24px;
  padding-bottom: 46px;
}

.hero-stage{
  position: relative;
  width: min(94vw, 560px);
  aspect-ratio: 1024 / 1536;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(0,0,0,.14);
  background: rgba(255,255,255,.14);
  backdrop-filter: blur(1px);
}

.hero-image{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  user-select: none;
  pointer-events: none;
  transform: scale(1.02);
}

.float-layer{
  position: absolute;
  inset: 0;
  pointer-events: none;
  animation: bgFloat 9s ease-in-out infinite;
}

@keyframes bgFloat{
  0%,100%{ transform: translateY(0px); }
  50%{ transform: translateY(-7px); }
}

.floating-heart{
  position:absolute;
  font-size: clamp(18px, 4vw, 28px);
  z-index: 4;
  animation: drift 3.8s ease-in-out infinite;
  pointer-events:none;
}

.floating-heart.h1{ left: 22%; top: 48.5%; animation-delay: -.6s; }
.floating-heart.h2{ left: 49%; top: 50.4%; animation-delay: -1.7s; }
.floating-heart.h3{ left: 66%; top: 48.4%; animation-delay: -2.3s; }
.floating-heart.h4{ left: 42%; top: 70%; animation-delay: -3.1s; }

@keyframes drift{
  0%,100%{ transform: translateY(0) scale(1); opacity: .85; }
  50%{ transform: translateY(-12px) scale(1.08); opacity: 1; }
}

.drawn-cat{
  position: absolute;
  width: clamp(70px, 16vw, 112px);
  height: auto;
  z-index: 6;
  user-select: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.10));
}

.drawn-cat svg{ width:100%; height:auto; display:block; }

.drawn-cat .cat-body{
  animation: bob .58s ease-in-out infinite;
  transform-origin: center center;
}
.drawn-cat .tail{
  animation: tail .75s ease-in-out infinite;
  transform-origin: 84% 52%;
}
.drawn-cat .paw{
  animation: paw .4s ease-in-out infinite alternate;
  transform-origin: center center;
}
.drawn-cat .eye{
  animation: blink 5s infinite;
  transform-origin: center center;
}

@keyframes bob{
  0%,100%{ transform: translateY(0px); }
  50%{ transform: translateY(-2px); }
}
@keyframes tail{
  0%,100%{ transform: rotate(-6deg); }
  50%{ transform: rotate(8deg); }
}
@keyframes paw{
  from{ transform: translateY(0); }
  to{ transform: translateY(2px); }
}
@keyframes blink{
  0%, 44%, 48%, 100% { transform: scaleY(1); }
  46% { transform: scaleY(0.1); }
}

#catTop{
  width: clamp(84px, 18vw, 122px);
  left: 41.4%;
  top: 21.8%;
  z-index: 7;
}

#catRunner1{
  width: clamp(82px, 17vw, 120px);
  left: -18%;
  top: 79%;
  animation: runAcross1 9s linear infinite;
  pointer-events:none;
}

#catRunner2{
  width: clamp(80px, 16vw, 116px);
  left: -22%;
  top: 84%;
  animation: runAcross2 12s linear infinite;
  pointer-events:none;
}

#catShy{
  width: clamp(78px, 15.5vw, 110px);
  left: 14%;
  top: 78%;
  transition: left .28s ease, top .28s ease, transform .16s ease;
}

@keyframes runAcross1{
  0%{ transform: translateX(0) scaleX(1); }
  49%{ transform: translateX(138vw) scaleX(1); }
  50%{ transform: translateX(138vw) scaleX(-1); }
  99%{ transform: translateX(0) scaleX(-1); }
  100%{ transform: translateX(0) scaleX(1); }
}
@keyframes runAcross2{
  0%{ transform: translateX(0) scaleX(1); }
  49%{ transform: translateX(144vw) scaleX(1); }
  50%{ transform: translateX(144vw) scaleX(-1); }
  99%{ transform: translateX(0) scaleX(-1); }
  100%{ transform: translateX(0) scaleX(1); }
}

.buttons-row{
  position: absolute;
  left: 11.5%;
  top: 57.2%;
  width: 77%;
  display: flex;
  justify-content: space-between;
  z-index: 9;
}

.sketch-btn{
  width: 42.5%;
  min-height: 66px;
  border: 3px solid rgba(72,54,37,.88);
  border-radius: 999px;
  font-family: inherit;
  font-weight: 800;
  font-size: clamp(24px, 5.5vw, 34px);
  letter-spacing: .5px;
  cursor: pointer;
  box-shadow: 0 7px 16px rgba(0,0,0,.12);
  transition: transform .14s ease, box-shadow .14s ease, opacity .18s ease;
  color: #2e3650;
  background-size: cover;
  background-position: center;
  position: relative;
}

.sketch-btn span{
  position: relative;
  z-index: 2;
}

.sketch-btn:active{
  transform: scale(.97);
}

#yesBtn{
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.45), transparent 42%),
    repeating-linear-gradient(18deg, rgba(112,198,92,.55) 0 3px, rgba(144,224,126,.7) 3px 8px, rgba(119,201,102,.5) 8px 12px);
}

#yesBtn::after{
  content:"";
  position:absolute;
  inset: 2px;
  border-radius: 999px;
  border: 2px dashed rgba(72,54,37,.22);
}

#noBtn{
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.42), transparent 42%),
    repeating-linear-gradient(-16deg, rgba(255,136,160,.58) 0 3px, rgba(255,171,188,.74) 3px 8px, rgba(255,142,168,.5) 8px 12px);
  color:#9b3a56;
}

#noBtn::after{
  content:"";
  position:absolute;
  inset: 2px;
  border-radius: 999px;
  border: 2px dashed rgba(72,54,37,.18);
}

.panel{
  width: min(94vw, 560px);
  background: rgba(255,255,255,.76);
  backdrop-filter: blur(5px);
  border-radius: 28px;
  padding: 18px 14px 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,.10);
}

.title{
  font-size: clamp(26px, 6vw, 38px);
  line-height: 1.12;
  text-align: center;
  font-weight: 800;
  margin: 0;
}

.subtitle{
  margin: 12px auto 0;
  width: min(100%, 460px);
  text-align: center;
  line-height: 1.35;
  font-size: 15px;
  font-weight: 700;
  color: #4a4038;
}

.list{
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 18px;
}

.choice-btn, .final-btn{
  width: 100%;
  border: none;
  border-radius: 22px;
  padding: 16px 16px;
  font-family: inherit;
  font-weight: 800;
  line-height: 1.3;
  font-size: 17px;
  color: var(--ink);
  background: rgba(255,255,255,.93);
  box-shadow: 0 10px 24px rgba(47,39,33,.12);
  cursor: pointer;
}

.choice-btn{
  text-align: center;
}

.choice-btn:active, .final-btn:active{
  transform: scale(.985);
}

.final-btn{
  background: rgba(255, 231, 141, .95);
  font-size: 18px;
  margin-top: 18px;
}

.note{
  margin-top: 14px;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: #4a4038;
}

.heart-burst{
  position: fixed;
  z-index: 40;
  font-size: 22px;
  pointer-events: none;
  animation: heartUp .9s ease-out forwards;
}

@keyframes heartUp{
  0%{ opacity: 1; transform: translateY(0) scale(.9); }
  100%{ opacity: 0; transform: translateY(-70px) scale(1.24); }
}

@media (max-width: 420px){
  .panel{ padding-left: 12px; padding-right: 12px; }
  .choice-btn, .final-btn{ font-size: 16px; }
  .subtitle{ font-size: 14px; }
  .buttons-row{ top: 56.8%; left: 10.8%; width: 78.4%; }
  .sketch-btn{ min-height: 62px; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const app = document.getElementById('app');

const ideas = [
"1. Чтение друг другу книг вслух, с эмоциями, как актеры.",
"2. Пешеходная прогулка до рассвета, чтобы встретить солнце вдвоем.",
"3. Поиск созвездий и выдумывание собственных легенд о них.",
"4. Совместный рисунок на старой простыне или большом ватмане.",
"5. Съемка друг друга на камеру, как будто это кино.",
"6. Спонтанное интервью друг с другом — будто вы знаменитости.",
"7. Сидеть в людном месте и придумывать истории случайных прохожих.",
"8. Хочу окультуриваться (музей, театры и т.д).",
"9. Посмотреть фильм вдвоем в уютном кинозале КиноКомпас, а потом спокойно прогуляться.",
"10. Просто выбрать направление и гулять без плана, куда захочется."
];

function heartBurst(x, y){
  const heart = document.createElement('div');
  heart.className = 'heart-burst';
  heart.textContent = '💖';
  heart.style.left = (x - 10) + 'px';
  heart.style.top = (y - 10) + 'px';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 900);
}

document.addEventListener('click', (e) => {
  heartBurst(e.clientX, e.clientY);
});

function catSvg(fill, stroke){
  return `
  <svg viewBox="0 0 120 85" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g class="cat-body">
      <path class="tail" d="M92 40 C108 28, 120 32, 114 46 C109 56, 97 55, 90 48" fill="none" stroke="${stroke}" stroke-width="4.2" stroke-linecap="round"/>
      <ellipse cx="58" cy="45" rx="34" ry="20" fill="${fill}" stroke="${stroke}" stroke-width="3.6"/>
      <circle cx="30" cy="35" r="15" fill="${fill}" stroke="${stroke}" stroke-width="3.6"/>
      <path d="M18 25 L24 12 L31 24" fill="${fill}" stroke="${stroke}" stroke-width="3.6" stroke-linejoin="round"/>
      <path d="M30 24 L38 12 L42 26" fill="${fill}" stroke="${stroke}" stroke-width="3.6" stroke-linejoin="round"/>
      <circle class="eye" cx="26" cy="34" r="1.8" fill="${stroke}"/>
      <circle class="eye" cx="34" cy="34" r="1.8" fill="${stroke}"/>
      <path d="M28 39 Q30 41 32 39" fill="none" stroke="${stroke}" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M21 38 H12 M21 41 H11 M39 38 H48 M39 41 H49" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>
      <path class="paw" d="M40 61 L38 73" stroke="${stroke}" stroke-width="4.4" stroke-linecap="round"/>
      <path class="paw" d="M58 62 L56 74" stroke="${stroke}" stroke-width="4.4" stroke-linecap="round"/>
      <path class="paw" d="M74 61 L73 73" stroke="${stroke}" stroke-width="4.4" stroke-linecap="round"/>
      <path class="paw" d="M88 58 L91 70" stroke="${stroke}" stroke-width="4.4" stroke-linecap="round"/>
    </g>
  </svg>`;
}

function heroCats(){
  return `
    <div class="drawn-cat" id="catTop">${catSvg('#f6d58c','#7a5d3e')}</div>
    <div class="drawn-cat" id="catShy">${catSvg('#f1c972','#72543a')}</div>
    <div class="drawn-cat" id="catRunner1">${catSvg('#f7cf83','#6f5237')}</div>
    <div class="drawn-cat" id="catRunner2">${catSvg('#acacac','#505050')}</div>
  `;
}

function page1(){
  window.scrollTo(0,0);
  app.innerHTML = `
    <div class="page">
      <div class="hero-stage" id="heroWrap">
        <div class="float-layer">
          <img class="hero-image" src="bg.jpg" alt="Пойдешь со мной на свидание">
        </div>

        <div class="floating-heart h1">💖</div>
        <div class="floating-heart h2">💛</div>
        <div class="floating-heart h3">💖</div>
        <div class="floating-heart h4">💛</div>

        ${heroCats()}

        <div class="buttons-row">
          <button class="sketch-btn" id="yesBtn" type="button"><span>ДА</span></button>
          <button class="sketch-btn" id="noBtn" type="button"><span>НЕТ</span></button>
        </div>
      </div>
    </div>
  `;

  const yes = document.getElementById('yesBtn');
  const no = document.getElementById('noBtn');
  const wrap = document.getElementById('heroWrap');
  const shyCat = document.getElementById('catShy');
  let noScale = 1;

  yes.addEventListener('click', (e) => {
    e.stopPropagation();
    page2();
  });

  no.addEventListener('click', (e) => {
    e.stopPropagation();
    noScale = Math.max(0.18, noScale * 0.62);
    no.style.transform = `scale(${noScale})`;
    no.style.opacity = Math.max(0.55, noScale + 0.18);
  });

  function moveCatAway(clientX, clientY){
    const rect = wrap.getBoundingClientRect();
    const catRect = shyCat.getBoundingClientRect();
    const catX = catRect.left + catRect.width / 2;
    const catY = catRect.top + catRect.height / 2;
    const dx = catX - clientX;
    const dy = catY - clientY;
    const dist = Math.hypot(dx, dy);

    if(dist < 125){
      const nx = dx === 0 ? (Math.random() > .5 ? 1 : -1) : dx / dist;
      const ny = dy === 0 ? (Math.random() > .5 ? 1 : -1) : dy / dist;

      let left = ((catRect.left - rect.left) / rect.width) * 100;
      let top = ((catRect.top - rect.top) / rect.height) * 100;

      left += nx * 10;
      top += ny * 7;

      left = Math.max(4, Math.min(84, left));
      top = Math.max(66, Math.min(88, top));

      shyCat.style.left = left + '%';
      shyCat.style.top = top + '%';
      shyCat.style.transform = `scale(${1.07 + Math.random()*0.13})`;
      setTimeout(() => { shyCat.style.transform = ''; }, 160);
    }
  }

  wrap.addEventListener('pointermove', (e) => moveCatAway(e.clientX, e.clientY));
  wrap.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    if(t) moveCatAway(t.clientX, t.clientY);
  }, { passive: true });
}

function page2(){
  window.scrollTo(0,0);
  app.innerHTML = `
    <div class="page scroll">
      <div class="panel">
        <h1 class="title">Выбирай свидание ✨</h1>
        <div class="subtitle">Я собрал варианты так, чтобы они были понятными, красивыми и чтобы тебе хотелось выбрать одно прямо сейчас.</div>
        <div class="list" id="list"></div>
      </div>
    </div>
  `;

  const list = document.getElementById('list');
  ideas.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.type = 'button';
    btn.textContent = text;
    btn.addEventListener('click', () => page3(i + 1));
    list.appendChild(btn);
  });
}

function page3(num){
  window.scrollTo(0,0);
  app.innerHTML = `
    <div class="page">
      <div class="panel">
        <h1 class="title">Отличный выбор 💖</h1>
        <div class="subtitle">Теперь нажимай кнопку ниже и напиши мне число, время и номер свидания.</div>
        <button class="final-btn" id="writeBtn" type="button">Напиши мне в Telegram</button>
        <div class="note">Я уже жду сообщение про свидание №${num} ✨</div>
      </div>
    </div>
  `;

  document.getElementById('writeBtn').addEventListener('click', () => send(num));
}

function send(num){
  const text = encodeURIComponent("Я выбираю свидание №" + num + " 💖 Пишу число и время.");
  window.location.href = "https://t.me/vers_hik?text=" + text;
}

page1();
</script>
</body>
</html>
