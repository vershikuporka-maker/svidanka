<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: url("bg.jpg") center/cover no-repeat;
    min-height: 100vh;
}

/* затемнение меньше */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.25);
}

.page {
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;
}

/* невидимые кнопки поверх картинки */
.hotspot {
    position:absolute;
    cursor:pointer;
}

/* ДА */
#yesZone {
    bottom:20%;
    left:15%;
    width:30%;
    height:15%;
}

/* НЕТ */
#noZone {
    bottom:20%;
    right:15%;
    width:30%;
    height:15%;
}

/* страница 2 */
.center {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

button {
    width:90%;
    max-width:500px;
    padding:16px;
    margin:8px;
    font-size:18px;
    font-weight:600;
    border-radius:16px;
    border:none;
    background:white;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const app = document.getElementById("app");

function page1(){
    app.innerHTML = `
    <div class="page">
        <div id="yesZone" class="hotspot"></div>
        <div id="noZone" class="hotspot"></div>
    </div>
    `;

    document.getElementById("yesZone").onclick = page2;

    document.getElementById("noZone").onclick = () => {
        alert("😈 Не получится нажать");
    };
}

function page2(){
    app.innerHTML = `
    <div class="center">
        <h2>Выбирай свидание</h2>
        <div id="list"></div>
    </div>
    `;

    const ideas = [
"1. Чтение друг другу книг вслух, с эмоциями, как актеры.",
"2. Пешеходная прогулка до рассвета, чтобы встретить солнце вдвоем.",
"3. Поиск созвездий и выдумывание собственных легенд о них.",
"4. Совместный рисунок на старой простыне или большом ватмане.",
"5. Съемка друг друга на камеру, как будто это кино.",
"6. Спонтанное интервью друг с другом — будто вы знаменитости.",
"7. Сидеть в людном месте и придумывать истории случайных прохожих.",
"8. Хочу окультуриваться (музей, театры и т.д)."
];

    const list = document.getElementById("list");

    ideas.forEach((t,i)=>{
        const b = document.createElement("button");
        b.innerText = t;
        b.onclick = ()=>page3(i+1);
        list.appendChild(b);
    });
}

function page3(num){
    app.innerHTML = `
    <div class="center">
        <h2>Отличный выбор 💖</h2>
        <button onclick="send(${num})">
        Напиши мне в Telegram
        </button>
    </div>
    `;
}

function send(num){
    const text = encodeURIComponent("Я выбираю свидание №"+num);
    window.location.href = "https://t.me/vers_hik?text="+text;
}

page1();
</script>

</body>
</html>
