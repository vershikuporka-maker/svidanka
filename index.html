<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }

html {
    min-height: 100%;
    overflow-x: hidden;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Comic Neue', cursive;
    background: url("bg.jpg") center center / cover no-repeat fixed;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255, 250, 245, 0.45);
    backdrop-filter: blur(1px);
    z-index: 0;
}

#app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
}

.page {
    width: min(92vw, 520px);
    margin: 0 auto;
    padding: 28px 0 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.page.page-scroll {
    justify-content: flex-start;
    padding-top: 26px;
    padding-bottom: 36px;
}

.title {
    width: 100%;
    text-align: center;
    font-size: clamp(26px, 5.8vw, 38px);
    line-height: 1.15;
    color: #2f2a27;
    background: rgba(255,255,255,0.92);
    border: 3px solid #2f2a27;
    border-radius: 24px 26px 20px 28px;
    padding: 22px 18px;
    box-shadow: 4px 4px 0 #2f2a27;
    position: relative;
    transform: rotate(-0.8deg);
}

.subtitle {
    margin-top: 12px;
    font-size: 18px;
    color: #3c3532;
    text-align: center;
    background: rgba(255,255,255,0.88);
    border: 2px solid #2f2a27;
    border-radius: 18px 15px 20px 16px;
    padding: 10px 14px;
    box-shadow: 3px 3px 0 #2f2a27;
    transform: rotate(0.5deg);
}

.cat-top {
    position: absolute;
    right: 16px;
    top: -26px;
    font-size: 34px;
    transform: rotate(8deg);
    filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.15));
}

.buttons,
#list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 22px;
}

button {
    width: 100%;
    appearance: none;
    border: 3px solid #2f2a27;
    color: #2f2a27;
    background: rgba(255,255,255,0.96);
    border-radius: 22px 18px 24px 20px;
    padding: 16px 16px;
    font-family: 'Comic Neue', cursive;
    font-weight: 700;
    font-size: 21px;
    line-height: 1.2;
    box-shadow: 4px 4px 0 #2f2a27;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, opacity .2s ease;
}

button:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #2f2a27;
}

#yes {
    background: rgba(202, 255, 191, 0.95);
    transform: rotate(-1deg);
}

#no {
    background: rgba(255, 179, 186, 0.95);
    transform: rotate(1deg);
}

.date-btn {
    text-align: center;
    font-size: 20px;
    padding: 16px 14px;
    background: rgba(255,255,255,0.96);
}

.final-btn {
    background: rgba(255, 243, 176, 0.96);
    font-size: 22px;
}

.note {
    margin-top: 14px;
    font-size: 17px;
    text-align: center;
    color: #2f2a27;
    background: rgba(255,255,255,0.9);
    border: 2px solid #2f2a27;
    border-radius: 18px 16px 20px 14px;
    padding: 10px 12px;
    box-shadow: 3px 3px 0 #2f2a27;
}

.cat {
    position: fixed;
    left: -80px;
    font-size: 30px;
    z-index: 1;
    user-select: none;
    pointer-events: auto;
    transition: transform .15s ease;
    animation-name: catRun;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.18));
}

@keyframes catRun {
    from { transform: translateX(-90px); }
    to { transform: translateX(calc(100vw + 140px)); }
}

.heart {
    position: fixed;
    z-index: 3;
    font-size: 24px;
    pointer-events: none;
    animation: floatHeart 1s ease-out forwards;
}

@keyframes floatHeart {
    0% { opacity: 1; transform: translateY(0) scale(0.9); }
    100% { opacity: 0; transform: translateY(-85px) scale(1.25); }
}

@media (max-width: 480px) {
    .page {
        width: min(92vw, 460px);
        padding-left: 0;
        padding-right: 0;
    }

    .title {
        font-size: 28px;
    }

    button {
        font-size: 19px;
        padding: 15px 14px;
    }

    .date-btn {
        font-size: 18px;
    }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
const app = document.getElementById('app');

const ideas = [
    "1. Чтение друг другу книг вслух, с эмоциями, как актеры.",
    "2. Пешеходная прогулка до рассвета, чтобы встретить солнце вдвоем.",
    "3. Поиск созвездий и выдумывание собственных легенд о них.",
    "4. Совместный рисунок на старой простыне или большом ватмане.",
    "5. Съемка друг друга на камеру, как будто это кино.",
    "6. Спонтанное интервью друг с другом — будто вы знаменитости.",
    "7. Сидеть в людном месте и придумывать истории случайных прохожих.",
    "8. Хочу окультуриваться (музей, театры и т.д)."
];

function renderCats() {
    return `
        <div class="cat" style="top: 14%; animation-duration: 10s;">🐈</div>
        <div class="cat" style="top: 46%; animation-duration: 13s; animation-delay: -4s;">🐈‍⬛</div>
        <div class="cat" style="top: 78%; animation-duration: 11s; animation-delay: -7s;">🐈</div>
    `;
}

function initCats() {
    document.querySelectorAll('.cat').forEach(cat => {
        cat.addEventListener('click', (e) => {
            e.stopPropagation();
            const original = cat.textContent;
            cat.textContent = '😻';
            cat.style.transform = 'scale(1.25)';
            setTimeout(() => {
                cat.textContent = original.includes('⬛') ? '🐈‍⬛' : '🐈';
                cat.style.transform = '';
            }, 500);
        });
    });
}

function page1() {
    window.scrollTo(0, 0);
    app.innerHTML = `
        <div class="page">
            <div class="title">
                Пойдешь со мной на свидание? 💖
                <div class="cat-top">🐱</div>
            </div>

            <div class="subtitle">Выбирай только честно. Но кнопка «нет» всё равно очень стеснительная.</div>

            <div class="buttons">
                <button id="yes">ДА</button>
                <button id="no">НЕТ</button>
            </div>
        </div>
        ${renderCats()}
    `;

    const noBtn = document.getElementById('no');
    let shrink = 1;

    noBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        shrink = Math.max(0.18, shrink * 0.6);
        noBtn.style.transform = `scale(${shrink}) rotate(4deg)`;
        noBtn.style.opacity = Math.max(0.55, shrink + 0.2);
    });

    document.getElementById('yes').addEventListener('click', page2);

    initCats();
}

function page2() {
    window.scrollTo(0, 0);
    app.innerHTML = `
        <div class="page page-scroll">
            <div class="title">
                Выбирай свидание 💫
                <div class="cat-top">🐱</div>
            </div>
            <div class="subtitle">Я постарался придумать варианты, чтобы нам было особенно хорошо вдвоем.</div>
            <div id="list"></div>
        </div>
        ${renderCats()}
    `;

    const list = document.getElementById('list');

    ideas.forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'date-btn';
        btn.textContent = text;
        btn.addEventListener('click', () => page3(i + 1));
        list.appendChild(btn);
    });

    initCats();
}

function page3(num) {
    window.scrollTo(0, 0);
    app.innerHTML = `
        <div class="page">
            <div class="title">
                💖 Отличный выбор!
                <div class="cat-top">🐱</div>
            </div>

            <div class="subtitle">Теперь нажимай ниже и пиши мне число, время и номер свидания.</div>

            <div class="buttons">
                <button class="final-btn" id="writeBtn">Напиши мне в Телеграм</button>
            </div>

            <div class="note">Я уже жду сообщение про свидание №${num} ✨</div>
        </div>
        ${renderCats()}
    `;

    document.getElementById('writeBtn').addEventListener('click', () => send(num));
    initCats();
}

function send(num) {
    const text = encodeURIComponent("Я выбираю свидание №" + num + " 💖 Пишу число и время.");
    window.location.href = "https://t.me/vers_hik + text;
}

document.addEventListener('click', (e) => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = '💖';
    heart.style.left = (e.clientX - 10) + 'px';
    heart.style.top = (e.clientY - 10) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 1000);
});

page1();
</script>

</body>
</html>
