<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свидание</title>
<style>
body{
margin:0;
font-family:Arial;
background:url('bg.jpg') center/cover no-repeat;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.wrap{
width:90%;
max-width:420px;
text-align:center;
position:relative;
}

/* Плашка как старая */
.banner{
background:#f5d7a1;
border:4px solid #8b5a2b;
border-radius:25px;
padding:20px;
font-size:22px;
font-weight:bold;
position:relative;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

/* кот похожий */
.cat{
position:absolute;
top:-45px;
left:50%;
transform:translateX(-50%);
width:80px;
height:50px;
background:#f3c87c;
border:4px solid #8b5a2b;
border-radius:30px;
animation:breath 2s infinite;
}
.cat:before{
content:'';
position:absolute;
left:10px;
top:-18px;
width:15px;
height:15px;
background:#f3c87c;
border:4px solid #8b5a2b;
transform:rotate(45deg);
}
.cat:after{
content:'';
position:absolute;
right:-20px;
top:10px;
width:25px;
height:10px;
background:#f3c87c;
border:4px solid #8b5a2b;
border-radius:20px;
animation:tail 1s infinite;
}

@keyframes breath{
0%,100%{transform:translateX(-50%) translateY(0)}
50%{transform:translateX(-50%) translateY(-4px)}
}
@keyframes tail{
0%,100%{transform:rotate(0)}
50%{transform:rotate(20deg)}
}

/* кнопки */
.btn{
margin-top:20px;
padding:15px;
width:100%;
font-size:20px;
border-radius:30px;
border:3px solid #333;
cursor:pointer;
}

#yes{
background:#9cff9c;
animation:pulse 1.5s infinite;
}

#no{
background:#ff9c9c;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.07)}
}
</style>
</head>
<body>

<div class="wrap">

<div class="banner">
<div class="cat"></div>
Пойдешь со мной на свидание?
</div>

<button id="yes" class="btn">ДА</button>
<button id="no" class="btn">НЕТ</button>

</div>

<script>
let s=1;
const no=document.getElementById('no');

no.onclick=()=>{
s*=0.6;
no.style.transform="scale("+s+")";
};

document.getElementById('yes').onclick=()=>{
alert("дальше логика свидания");
};
</script>

</body>
</html>
