<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Для тебя 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#4d3a2d;
  --paper:rgba(255,255,255,.78);
  --shadow:0 16px 36px rgba(61,43,24,.18);
}
html,body{
  margin:0;
  min-height:100%;
  overflow-x:hidden;
  font-family:'Montserrat',sans-serif;
  color:var(--ink);
}
body{
  background:url("bg.jpg") center center / cover no-repeat fixed;
}
body::before{
  content:"";
  position:fixed; inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,.06), rgba(255,255,255,.18));
  z-index:0;
  pointer-events:none;
}
#app{position:relative; z-index:2; min-height:100vh}

.page{
  min-height:100vh;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:18px 12px 28px;
}
.page.scroll{
  justify-content:flex-start;
  padding-top:18px;
  padding-bottom:44px;
}

.hero{
  position:relative;
  width:min(94vw,560px);
  aspect-ratio:1024/1536;
  border-radius:30px;
  overflow:hidden;
  box-shadow:var(--shadow);
  backdrop-filter:blur(1px);
}
.hero-bg{
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  pointer-events:none;
  user-select:none;
}
.banner-wrap{
  position:absolute;
  left:12%;
  top:8.5%;
  width:76%;
  z-index:6;
}
.banner-img{
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.08));
}
.cat-wrap{
  position:absolute;
  left:50%;
  top:-11%;
  width:40%;
  transform:translateX(-50%);
  z-index:7;
  animation:catBreath 2.6s ease-in-out infinite;
}
.cat-wrap img{
  width:100%;
  display:block;
  pointer-events:none;
  user-select:none;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,.08));
}
@keyframes catBreath{
  0%,100%{ transform:translateX(-50%) translateY(0) rotate(0deg); }
  50%{ transform:translateX(-50%) translateY(-4px) rotate(-1deg); }
}

.buttons-row{
  position:absolute;
  left:11.5%;
  top:58.8%;
  width:77%;
  display:flex;
  justify-content:space-between;
  z-index:8;
}
.sketch-btn{
  position:relative;
  width:42.8%;
  min-height:72px;
  border-radius:999px;
  border:4px solid rgba(82,59,40,.82);
  box-shadow:0 10px 18px rgba(72,48,29,.13);
  cursor:pointer;
  font-family:inherit;
  font-weight:800;
  font-size:clamp(24px,5.8vw,38px);
  letter-spacing:.5px;
  transition:transform .14s ease, opacity .18s ease;
}
.sketch-btn span{position:relative;z-index:2}
.sketch-btn:active{transform:scale(.97)}
.sketch-btn::after{
  content:"";
  position:absolute; inset:4px;
  border-radius:999px;
  border:2px dashed rgba(84,60,41,.18);
}
#yesBtn{
  color:#195f1f;
  background:
    radial-gradient(circle at 28% 24%, rgba(255,255,255,.45), transparent 42%),
    repeating-linear-gradient(18deg, rgba(129,213,109,.60) 0 4px, rgba(163,234,145,.84) 4px 10px, rgba(117,203,96,.56) 10px 14px);
  animation:yesPulse 1.5s ease-in-out infinite;
}
#noBtn{
  color:#b14658;
  background:
    radial-gradient(circle at 28% 24%, rgba(255,255,255,.44), transparent 42%),
    repeating-linear-gradient(-16deg, rgba(255,145,165,.62) 0 4px, rgba(255,186,198,.84) 4px 10px, rgba(255,136,157,.56) 10px 14px);
  transform-origin:center;
}
@keyframes yesPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}

.float-heart{
  position:absolute;
  z-index:4;
  font-size:clamp(18px,4vw,28px);
  pointer-events:none;
  animation:drift 4s ease-in-out infinite;
}
.float-heart.h1{left:24%; top:48%; animation-delay:-.5s}
.float-heart.h2{left:49%; top:49.5%; animation-delay:-1.7s}
.float-heart.h3{left:67%; top:48%; animation-delay:-2.6s}
.float-heart.h4{left:39%; top:69%; animation-delay:-3.2s}
@keyframes drift{
  0%,100%{transform:translateY(0) scale(1); opacity:.88}
  50%{transform:translateY(-12px) scale(1.08); opacity:1}
}

.runner{
  position:absolute;
  bottom:8%;
  z-index:5;
  font-size:56px;
  line-height:1;
  user-select:none;
  pointer-events:none;
}
#runner1{
  left:-12%;
  animation:run1 9s linear infinite;
}
#runner2{
  left:-18%;
  bottom:6%;
  animation:run2 11.5s linear infinite;
}
#scaredCat{
  left:12%;
  bottom:7%;
  transition:left .25s ease, bottom .25s ease, transform .15s ease;
}
@keyframes run1{
  0%{transform:translateX(0) scaleX(1)}
  49%{transform:translateX(132vw) scaleX(1)}
  50%{transform:translateX(132vw) scaleX(-1)}
  99%{transform:translateX(0) scaleX(-1)}
  100%{transform:translateX(0) scaleX(1)}
}
@keyframes run2{
  0%{transform:translateX(0) scaleX(1)}
  49%{transform:translateX(138vw) scaleX(1)}
  50%{transform:translateX(138vw) scaleX(-1)}
  99%{transform:translateX(0) scaleX(-1)}
  100%{transform:translateX(0) scaleX(1)}
}

.panel{
  width:min(94vw,560px);
  background:var(--paper);
  border-radius:28px;
  padding:18px 14px;
  backdrop-filter:blur(5px);
  box-shadow:var(--shadow);
}
.title{
  margin:0;
  text-align:center;
  font-size:clamp(26px,6vw,38px);
  line-height:1.14;
  font-weight:800;
}
.subtitle{
  margin:12px auto 0;
  max-width:460px;
  text-align:center;
  font-size:15px;
  line-height:1.35;
  font-weight:700;
  color:#5b4739;
}
.list{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:18px;
}
.choice-btn,.final-btn{
  width:100%;
  border:none;
  border-radius:22px;
  padding:16px;
  background:rgba(255,255,255,.94);
  color:var(--ink);
  box-shadow:0 10px 20px rgba(0,0,0,.08);
  font-family:inherit;
  font-weight:800;
  font-size:17px;
  line-height:1.3;
  text-align:center;
  cursor:pointer;
}
.choice-btn:active,.final-btn:active{transform:scale(.985)}
.final-btn{
  margin-top:18px;
  background:rgba(255,231,141,.96);
  font-size:18px;
}
.note{
  margin-top:14px;
  text-align:center;
  font-size:15px;
  font-weight:700;
  color:#5b4739;
}
.heart-burst{
  position:fixed;
  z-index:40;
  font-size:22px;
  pointer-events:none;
  animation:heartUp .9s ease-out forwards;
}
@keyframes heartUp{
  0%{opacity:1;transform:translateY(0) scale(.9)}
  100%{opacity:0;transform:translateY(-72px) scale(1.24)}
}

@media (max-width:420px){
  .banner-wrap{left:10%; width:80%; top:8%}
  .cat-wrap{width:42%; top:-12%}
  .buttons-row{left:10.5%; top:58%; width:79%}
  .sketch-btn{min-height:66px}
  .runner{font-size:48px}
  .panel{padding:16px 12px}
  .choice-btn,.final-btn{font-size:16px}
  .subtitle,.note{font-size:14px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app = document.getElementById('app');

const ideas = [
  "1. Чтение друг другу книг вслух, с эмоциями, как актеры.",
  "2. Пешеходная прогулка до рассвета, чтобы встретить солнце вдвоем.",
  "3. Поиск созвездий и выдумывание собственных легенд о них.",
  "4. Совместный рисунок на старой простыне или большом ватмане.",
  "5. Съемка друг друга на камеру, как будто это кино.",
  "6. Спонтанное интервью друг с другом — будто вы знаменитости.",
  "7. Сидеть в людном месте и придумывать истории случайных прохожих.",
  "8. Хочу окультуриваться (музей, театры и т.д)."
];

function heartBurst(x,y){
  const h=document.createElement('div');
  h.className='heart-burst';
  h.textContent='💖';
  h.style.left=(x-10)+'px';
  h.style.top=(y-10)+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),900);
}
document.addEventListener('click',(e)=>heartBurst(e.clientX,e.clientY));

function page1(){
  window.scrollTo(0,0);
  app.innerHTML = `
    <div class="page">
      <div class="hero" id="hero">
        <img class="hero-bg" src="bg.jpg" alt="">
        <div class="banner-wrap">
          <img class="banner-img" src="banner.png" alt="">
          <div class="cat-wrap"><img src="cat.png" alt=""></div>
        </div>

        <div class="float-heart h1">💖</div>
        <div class="float-heart h2">💛</div>
        <div class="float-heart h3">💖</div>
        <div class="float-heart h4">💛</div>

        <div class="buttons-row">
          <button class="sketch-btn" id="yesBtn" type="button"><span>ДА</span></button>
          <button class="sketch-btn" id="noBtn" type="button"><span>НЕТ</span></button>
        </div>

        <div class="runner" id="scaredCat">🐈</div>
        <div class="runner" id="runner1">🐈</div>
        <div class="runner" id="runner2">🐈‍⬛</div>
      </div>
    </div>
  `;

  const hero = document.getElementById('hero');
  const shy = document.getElementById('scaredCat');
  const no = document.getElementById('noBtn');
  let noScale = 1;

  document.getElementById('yesBtn').addEventListener('click',(e)=>{
    e.stopPropagation();
    page2();
  });

  no.addEventListener('click',(e)=>{
    e.stopPropagation();
    noScale = Math.max(.18, noScale * .62);
    no.style.transform = `scale(${noScale})`;
    no.style.opacity = Math.max(.55, noScale + .18);
  });

  function moveCatAway(clientX, clientY){
    const rect = hero.getBoundingClientRect();
    const c = shy.getBoundingClientRect();
    const cx = c.left + c.width/2;
    const cy = c.top + c.height/2;
    const dx = cx - clientX;
    const dy = cy - clientY;
    const dist = Math.hypot(dx, dy);

    if(dist < 130){
      const nx = dx === 0 ? (Math.random() > .5 ? 1 : -1) : dx / dist;
      const ny = dy === 0 ? (Math.random() > .5 ? 1 : -1) : dy / dist;
      let left = ((c.left - rect.left) / rect.width) * 100;
      let bottom = ((rect.bottom - c.bottom) / rect.height) * 100;
      left += nx * 10;
      bottom -= ny * 7;
      left = Math.max(3, Math.min(82, left));
      bottom = Math.max(5, Math.min(18, bottom));
      shy.style.left = left + '%';
      shy.style.bottom = bottom + '%';
      shy.style.transform = 'scale(1.08)';
      setTimeout(()=>shy.style.transform='',160);
    }
  }

  hero.addEventListener('pointermove',(e)=>moveCatAway(e.clientX,e.clientY));
  hero.addEventListener('touchstart',(e)=>{
    const t=e.touches[0];
    if(t) moveCatAway(t.clientX,t.clientY);
  },{passive:true});
}

function page2(){
  window.scrollTo(0,0);
  app.innerHTML = `
    <div class="page scroll">
      <div class="panel">
        <h2 class="title">Выбирай свидание ✨</h2>
        <div class="subtitle">Я собрал варианты так, чтобы они были понятными, красивыми и чтобы тебе хотелось выбрать одно прямо сейчас.</div>
        <div class="list" id="list"></div>
      </div>
    </div>
  `;
  const list=document.getElementById('list');
  ideas.forEach((text,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.type='button';
    btn.textContent=text;
    btn.addEventListener('click',()=>page3(i+1));
    list.appendChild(btn);
  });
}

function page3(num){
  window.scrollTo(0,0);
  app.innerHTML = `
    <div class="page">
      <div class="panel">
        <h2 class="title">Отличный выбор 💖</h2>
        <div class="subtitle">Теперь нажимай кнопку ниже и напиши мне число, время и номер свидания.</div>
        <button class="final-btn" id="writeBtn" type="button">Напиши мне в Telegram</button>
        <div class="note">Я уже жду сообщение про свидание №${num} ✨</div>
      </div>
    </div>
  `;
  document.getElementById('writeBtn').addEventListener('click',()=>send(num));
}

function send(num){
  const text = encodeURIComponent("Я выбираю свидание №" + num + " 💖 Пишу число и время.");
  window.location.href = "https://t.me/vers_hik?text=" + text;
}

page1();
</script>
</body>
</html>
